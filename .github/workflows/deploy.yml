name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            ca-certificates \
            fontconfig \
            git \
            make \
            zip \
            python3 \
            pandoc \
            texlive-xetex \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-lang-other \
            fonts-dejavu \
            fonts-liberation \
            fonts-linuxlibertine \
            lmodern \
            imagemagick \
            librsvg2-bin \
            ncurses-bin
          LIBERTINUS_SRC="$(find /usr/share/texlive -type d -name 'libertinus-fonts' -print -quit)"
          if [ -n "$LIBERTINUS_SRC" ]; then
            mkdir -p /usr/local/share/fonts/libertinus
            cp "$LIBERTINUS_SRC"/*.otf /usr/local/share/fonts/libertinus/
            fc-cache -f
          else
            echo "Libertinus fonts not found in TeX Live" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fix git safe.directory inside container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Loosen ImageMagick PDF policy
        run: |
          if [ -f /etc/ImageMagick-6/policy.xml ]; then
            sed -i 's@<policy domain="coder" rights="none" pattern="PDF" />@<policy domain="coder" rights="read|write" pattern="PDF" />@' /etc/ImageMagick-6/policy.xml || true
          fi

      - name: Build guide
        run: bash scripts/build_vi.sh

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Upload build outputs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bgnet-vi-docs
          path: docs
          retention-days: 14

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
