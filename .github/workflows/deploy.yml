name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the container image with GitHub Actions cache. First run on a
      # branch is slow (texlive-full is ~5GB); subsequent runs restore from
      # gha cache in ~30 seconds.
      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vi
          tags: bgnet-vi-build:local
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build guide
        run: |
          docker run --rm \
            -v "$PWD:/guide" \
            -w /guide \
            -e BGBS_THREADS=4 \
            bgnet-vi-build:local \
            bash scripts/build_vi.sh

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Upload build outputs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bgnet-vi-docs
          path: docs
          retention-days: 14

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
