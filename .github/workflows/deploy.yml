name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Use the prebuilt image from ghcr.io (published by build-image.yml).
    # All build tools (pandoc, texlive-full, Libertinus fonts, etc.) are
    # already installed so this step just clones and runs make.
    container:
      image: ghcr.io/${{ github.repository }}-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Fix git safe.directory inside container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Build guide
        env:
          # Parallelise xelatex runs across PDF variants.
          BGBS_THREADS: "4"
        run: bash scripts/build_vi.sh

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Upload build outputs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: bgnet-vi-docs
          path: docs
          retention-days: 14

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
